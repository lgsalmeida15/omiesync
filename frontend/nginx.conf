server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy para o backend (rede interna Coolify)
    # Resolver Docker interno — resolve hostname dinamicamente para evitar crash no boot
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend "xz706l7jhiin5ebdwk1mqizq-002406752978:8080";

    location /api/ {
        proxy_pass http://$backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE — desabilita buffering para eventos em tempo real
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Vue Router — todas as rotas caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets com hash no nome
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
